services:
  therapy:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      THERAPY_DATA_DIR: /data
    volumes:
      # All personal data (audio archive, timelines, user model) lives here —
      # on user-controlled infrastructure only (SPEC §8).
      - therapy-data:/data
      # Model weights (whisper, kokoro, silero) — survive rebuilds.
      - model-cache:/root/.cache

volumes:
  therapy-data:
  model-cache:
