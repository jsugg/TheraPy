services:
  therapy:
    build: .
    restart: unless-stopped
    # Bounded broad-log retention (obs plan O1.5): the `local` driver replaces
    # Docker's unbounded json-file default. Stdout stays authoritative.
    logging:
      driver: local
      options:
        max-size: "20m"
        max-file: "5"
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      THERAPY_DATA_DIR: /data
    extra_hosts:
      # Lets THERAPY_LLM=ollama reach an Ollama server on the host
      # (no-op on Docker Desktop, needed on Linux).
      - "host.docker.internal:host-gateway"
    volumes:
      # All personal data (audio archive, timelines, user model) lives here —
      # on user-controlled infrastructure only (SPEC §8).
      - therapy-data:/data
      # Model weights (whisper, kokoro, silero) — survive rebuilds.
      - model-cache:/root/.cache
      # Live dev mounts — source (incl. PWA static) and tests, read-only over the
      # baked copies. UI/code/test edits are picked up without an image rebuild:
      # a browser reload serves fresh static, pytest reads current code + tests,
      # and the server picks up Python edits on its next restart (`make restart`).
      # `therapy` is an editable install at /app/src, and the venv lives at
      # /app/.venv (NOT under these paths, so it is never shadowed). A rebuild is
      # only needed when dependencies change.
      - ./src:/app/src:ro
      - ./tests:/app/tests:ro
    # Liveness beyond process-liveness: a wedged event loop still has a live
    # PID but stops answering /health. The in-container watchdog (Dockerfile
    # CMD) restarts uvicorn on hang; this healthcheck surfaces the state to
    # `docker compose ps`. start_period covers cold model loading.
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=8).status == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    stop_grace_period: 20s
    # Hard cap so runaway memory OOM-kills THIS container (restart policy
    # brings it back) instead of exhausting the Docker VM — an exhausted VM
    # wedges at the hypervisor level and takes the docker CLI and every
    # port-forward down with it (observed twice on 2026-07-10).
    mem_limit: 5g

  # TURN relay for clients whose host candidates can't reach the pipeline
  # (the phone over Tailscale: the server only advertises container-internal
  # IPs, and container→tailnet UDP is not guaranteed). The client allocates a
  # relay via turn:<page-host>:3478; the pipeline reaches the relay directly
  # on this compose network — no dependence on host↔container NAT quirks.
  # Restricted interaction backend selected by the O0.3 ADR
  # (docs/evidence/observability-backend-spike.md). Opt-in profile; loopback
  # UI/OTLP only; synthetic 30-day retention; derived store — the owned
  # journal remains the source of truth. The image's gRPC collector port
  # (4317) is deliberately NOT published (v18 binds [::] regardless of host
  # setting). Analytics/external resources are disabled.
  phoenix:
    image: arizephoenix/phoenix:version-18.0.0-nonroot
    profiles: ["llm-observability"]
    restart: unless-stopped
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "127.0.0.1:6006:6006"
    environment:
      PHOENIX_TELEMETRY_ENABLED: "false"
      PHOENIX_ALLOW_EXTERNAL_RESOURCES: "false"
      PHOENIX_DEFAULT_RETENTION_POLICY_DAYS: "30"
      PHOENIX_WORKING_DIR: /mnt/data
    volumes:
      - phoenix-data:/mnt/data
    mem_limit: 1g

  # --- opt-in broad-plane dev/test stack (obs plan O2.4; NOT production) ---
  # `docker compose --profile observability up -d` starts a pinned isolated
  # collector (two pipelines + file_storage WAL) and the disposable
  # grafana/otel-lgtm all-in-one. UI is loopback-only; OTLP stays internal.
  # First run only — both images are non-root, so seed volume ownership:
  #   docker run --rm -v therapy_collector-wal:/w alpine chown -R 10001:10001 /w
  #   docker run --rm -v therapy_phoenix-data:/d alpine chown -R 65532:65532 /d
  collector:
    image: otel/opentelemetry-collector-contrib:0.156.0
    profiles: ["observability"]
    restart: unless-stopped
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"
    command: ["--config=/etc/otelcol/collector.yaml"]
    volumes:
      - ./deploy/observability/collector.yaml:/etc/otelcol/collector.yaml:ro
      - collector-wal:/var/lib/otelcol
    mem_limit: 256m

  lgtm:
    image: grafana/otel-lgtm:0.29.0
    profiles: ["observability"]
    restart: unless-stopped
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "127.0.0.1:3000:3000" # Grafana UI only; OTLP/scrape stay internal
    volumes:
      - lgtm-data:/data
      - ./deploy/observability/grafana/provisioning/dashboards/therapy.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/therapy.yaml:ro
      - ./deploy/observability/grafana/provisioning/alerting:/otel-lgtm/grafana/conf/provisioning/alerting:ro
      - ./deploy/observability/dashboards:/var/lib/grafana/dashboards/therapy:ro
    mem_limit: 1500m

  turn:
    image: coturn/coturn:4.6
    restart: unless-stopped
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"
    command:
      - --listening-port=3478
      - --lt-cred-mech
      - --user=therapy:${THERAPY_TURN_PASSWORD:-therapy-local}
      - --realm=therapy
      - --no-cli
      - --no-tls
      - --no-dtls
      - --prometheus
      - --prometheus-port=9641
      # Relay sockets stay on the compose network (reachable by the pipeline);
      # only the control port is published to the host.
      - --min-port=49160
      - --max-port=49200
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
    mem_limit: 256m

volumes:
  therapy-data:
  model-cache:
  phoenix-data:
  collector-wal:
  lgtm-data:
