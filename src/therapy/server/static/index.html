<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1b4332">
  <title>TheraPy</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon.svg">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header>
    <h1>TheraPy</h1>
    <span id="status" data-state="idle">offline</span>
  </header>

  <main id="chat" aria-live="polite"></main>

  <footer>
    <button id="connect" class="primary">Start conversation</button>
    <div id="controls" hidden>
      <button id="mic" class="toggle" aria-pressed="true" title="Microphone">🎙️</button>
      <input id="text" type="text" placeholder="Type instead of speaking…"
             autocomplete="off" enterkeyhint="send">
      <button id="send" title="Send">➤</button>
      <select id="lang" title="Reply language">
        <option value="">Auto</option>
        <option value="es">ES</option>
        <option value="en">EN</option>
        <option value="pt">PT</option>
      </select>
      <button id="speaker" class="toggle" aria-pressed="true" title="Voice replies">🔊</button>
    </div>
  </footer>

  <audio id="bot-audio" autoplay></audio>
  <script src="/app.js"></script>
</body>
</html>
